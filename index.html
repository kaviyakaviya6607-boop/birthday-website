<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Sister</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
background:white;
width:60%;
max-width:700px;
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 0 25px #ff4081;
position:relative;
overflow:hidden;
}

.profile-pic{
width:220px;
height:280px;
object-fit:cover;
object-position:top;
border-radius:20px;
display:block;
margin:0 auto 20px auto;
border:6px solid #ff4081;
box-shadow:0 15px 35px rgba(255,64,129,0.4);
}

h1{
color:#ff3f81;
font-size:40px;
}

p{
font-size:18px;
color:#555;
}

.btn{
background:#ff4081;
color:white;
padding:15px 35px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

.magic-link{
display:block;
margin-top:25px;
color:#ff4081;
font-size:18px;
text-decoration:none;
}

/* hearts inside card */

.heart{
position:absolute;
top:-20px;
font-size:20px;
animation:fall 4s linear forwards;
}

@keyframes fall{
to{
transform:translateY(500px);
opacity:0;
}
}

</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" src="bgm.mp4"></audio>

<div class="card">

<img src="ez2.jpeg" class="profile-pic">

<h1>🎉 Happy Birthday My Dear 🎂</h1>


<p>
💖 A sister like you is a blessing in our life 💖<br>
✨ Thank you for filling our world with love and happiness ✨
</p> 


<button class="btn" onclick="celebrate()">Celebrate 🎊</button>

<a href="wish.html" class="magic-link">
✨ Click Here to See Magic ✨
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function celebrate(){

/* PLAY MUSIC */
document.getElementById("music").play();

var duration=4*1000;
var end=Date.now()+duration;

(function frame(){

confetti({
particleCount:15,
angle:60,
spread:100,
origin:{x:0}
});

confetti({
particleCount:15,
angle:120,
spread:100,
origin:{x:1}
});

if(Date.now()<end){
setTimeout(function(){
requestAnimationFrame(frame);
},60);
}

}());

}

/* hearts */

function createHeart(){

const card=document.querySelector(".card");

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="💖";

heart.style.left=Math.random()*card.clientWidth+"px";

heart.style.fontSize=Math.random()*15+15+"px";

card.appendChild(heart);

setTimeout(()=>{
heart.remove();
},4000);

}

setInterval(createHeart,700);

</script>

</body>
</html>
